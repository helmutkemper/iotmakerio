<!DOCTYPE html>
<!-- server/public/control/index.html — IoTMaker Control Panel entry point.
     Served at /control by the server.
     Completely separate from /app — different session, different token lifetime,
     different JS bundle. Sharing nothing with the portal SPA is intentional.
     CSP is enforced at the HTTP header level on the server, not via meta tag. -->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoTMaker — Control Panel</title>

    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preload"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          as="style"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">

    <link rel="stylesheet" href="/control/css/control.css">
</head>
<body>

<div id="cp-shell">
    <!-- Sidebar -->
    <nav id="cp-sidebar">
        <div id="cp-logo">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Control Panel</span>
        </div>
        <div id="cp-nav"></div>
        <div id="cp-user-info"></div>
    </nav>

    <!-- Main area -->
    <div id="cp-main">
        <div id="cp-topbar">
            <div id="cp-breadcrumb"></div>
            <button id="cp-logout-btn" onclick="cpLogout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                Sair
            </button>
        </div>
        <div id="cp-root"></div>
    </div>
</div>

<script type="module" src="/control/js/main.js"></script>
</body>
</html>
