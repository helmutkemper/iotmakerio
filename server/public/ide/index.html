<!DOCTYPE html>
<!--
  server/public/ide/index.html — WASM IDE entry point.

  This file serves the Go/WASM IDE binary. It must be kept in sync with the
  development copy at ide/index.html (root of the repository).

  Auth token handshake:
    The IDE runs inside an iframe embedded by the SPA page (/app#ide).
    Template API calls require a Bearer token, which the SPA passes via
    window.postMessage after the WASM finishes loading.

    Protocol:
      1. This page listens for: { type: "IDE_AUTH_TOKEN", token: "Bearer ..." }
      2. On receipt, it sets window._ideAuthToken (read by rulesServer.GetAuthToken()).
      3. It also sends { type: "IDE_READY" } to the parent once the WASM starts,
         so the parent knows it is safe to send the token.

    Security: origin check is performed before accepting the token.
    The allowed origin is the page's own origin (same-origin iframe).

  WASM isolation headers (set by the server for /ide/* routes):
    Cross-Origin-Embedder-Policy: require-corp
    Cross-Origin-Opener-Policy: same-origin

  These are required by SharedArrayBuffer and WebAssembly.instantiateStreaming().
  They also mean this page cannot access window.opener — but postMessage from
  a same-origin parent iframe still works correctly.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Gopher IDE</title>

  <!--
    FontAwesome 6.5.1 — used by the hex-menu icons and any HTML the WASM
    runtime injects into the DOM (black-box block labels, device menus, etc.).

    Loaded with preload so the font files are already cached by the
    time the WASM module finishes loading and starts rendering.

    Locally hosted (FontAwesome 6.7.2) — see app.html's longer comment
    on the same change. The previous CDN-served 6.5.1 didn't match the
    metadata used by `cmd/gen-fa-icons`, so newer free icons rendered
    as missing-glyph tofu in the browser.
  -->
  <link rel="preload"
        href="/static/fontawesome/css/all.min.css"
        as="style">

  <link rel="stylesheet"
        href="/static/fontawesome/css/all.min.css">

  <!--
    Preload the solid webfont to prevent a flash of invisible icons the
    first time the WASM renders the hardware menu.
  -->
  <link rel="preload"
        href="/static/fontawesome/webfonts/fa-solid-900.woff2"
        as="font"
        type="font/woff2"
        crossorigin="anonymous">

  <script src="wasm_exec.js"></script>

  <!-- fa-free-styles.js: window.FA_FREE_STYLES — per-icon map of free
       font families ("solid", "regular", "brands"). The file manager's
       icon picker reads this to (a) filter Pro-only icon names out of
       the grid and (b) pick the correct `fa-solid/regular/brands`
       class for each icon name. Loaded before WASM so the map is
       populated when the picker first opens.
       Auto-generated by cmd/gen-fa-icons from the FontAwesome metadata. -->
  <script src="/static/js/fa-free-styles.js"></script>

  <!-- highlight.js for code syntax highlighting in the help panel.
       Loaded before WASM so window.hljs is available when panel renders markdown.
       The dracula theme provides vivid, colorful syntax coloring.
       Files served locally from /highlight/ (same pattern as /monaco/ and /marked/). -->
  <link rel="stylesheet" href="/highlight/dracula.min.css">
  <script src="/highlight/highlight.min.js"></script>

  <script>
    // ── Auth token handshake ──────────────────────────────────────────────
    //
    // The WASM reads window._ideAuthToken via rulesServer.GetAuthToken().
    // This listener populates it when the parent SPA sends the token after
    // the WASM signals it is ready.
    //
    // Security: only accept messages from the same origin as this page.
    // This prevents other pages from injecting a forged token.
    window.addEventListener("message", function(event) {
      // Same-origin check: reject messages from any other origin.
      if (event.origin !== window.location.origin) {
        console.warn("[IDE] Rejected postMessage from unexpected origin:", event.origin);
        return;
      }

      const msg = event.data;
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "IDE_AUTH_TOKEN") {
        if (typeof msg.token === "string" && msg.token.startsWith("Bearer ")) {
          window._ideAuthToken = msg.token;
          console.log("[IDE] Auth token received — template endpoints enabled");
        } else {
          console.warn("[IDE] IDE_AUTH_TOKEN message received but token was invalid");
        }
      }

      // Project ID for the live communication WebSocket.
      // Set by the SPA when the user enters the IDE with a specific project.
      // The WASM reads window._ideProjectID via live.Client.Connect().
      if (msg.type === "IDE_PROJECT_ID") {
        if (typeof msg.projectID === "string" && msg.projectID.length > 0) {
          window._ideProjectID = msg.projectID;
          console.log("[IDE] Project ID received:", msg.projectID);
        }
      }
    });

    // ── Project ID from URL parameter (for testing / direct access) ──────
    // Usage: /ide/index.html?project=teste123
    // This sets window._ideProjectID before the WASM reads it.
    // In production, the SPA sends this via postMessage (IDE_PROJECT_ID).
    (function() {
      const params = new URLSearchParams(window.location.search);
      const proj = params.get('project');
      if (proj) {
        window._ideProjectID = proj;
        console.log("[IDE] Project ID from URL:", proj);
      }
    })();

    // ── WASM bootstrap ────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      const go = new Go();
      WebAssembly.instantiateStreaming(
              fetch("main.wasm"),
              go.importObject
      ).then((result) => {
        go.run(result.instance);

        // Signal the parent SPA that the WASM is running and ready to
        // receive the auth token. The parent listens for this before sending.
        //
        // window.parent === window when not in an iframe (standalone dev
        // mode), so this postMessage is a safe no-op in that case.
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
                  { type: "IDE_READY" },
                  window.location.origin
          );
          console.log("[IDE] IDE_READY signal sent to parent");
        }
      }).catch(err => {
        console.error("[IDE] WASM load failed:", err);
      });
    });
  </script>
</head>
<body>
</body>
</html>
