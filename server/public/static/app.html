<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoTMaker</title>

    <!-- FontAwesome 6.7.2, hosted locally for licence/version control.
         The CDN dependency was removed because:
         (1) The CDN-served webfont version (6.5.1) was older than the
             metadata used by `cmd/gen-fa-icons` to populate
             `FA_FREE_SET`, so newer free icons rendered as missing-glyph
             tofu (□) in the browser even though they were listed.
         (2) Hosting locally guarantees metadata and webfont always come
             from the same FA release. To bump versions, swap the files
             in /static/fontawesome AND re-run `cmd/gen-fa-icons` against
             the same release.

         The preload + stylesheet pair lets the browser start the CSS
         fetch in parallel with HTML parsing, then apply the already-
         downloaded file without re-fetching. -->
    <link rel="preload"
          href="/static/fontawesome/css/all.min.css"
          as="style">

    <link rel="stylesheet"
          href="/static/fontawesome/css/all.min.css">

    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div id="app-shell">
    <!-- Sidebar esquerda -->
    <nav id="sidebar">
        <button id="sb-toggle" onclick="toggleSB()" title="Expandir menu">
            <i class="fa-solid fa-bars" style="color:var(--accent);flex-shrink:0"></i>
            <span class="sb-brand">IOTMAKER</span>
        </button>
        <div class="sb-nav" id="sb-nav"></div>
        <div class="sb-user" id="sb-user" style="display:none">
            <div class="sb-avatar" id="sb-av">?</div>
            <div class="sb-uinfo">
                <div class="sb-uname" id="sb-uname"></div>
                <div class="sb-urole" id="sb-urole"></div>
            </div>
        </div>
    </nav>

    <div id="main-content">
        <div id="topbar">
            <button id="site-title" onclick="nav('home')">IoTMaker</button>
        </div>
        <div id="app-root"></div>
    </div>
</div>

<!-- Entry-point do módulo ES -->
<!-- Bootstrap: reads the short-lived iotmaker_spa_token cookie that the
     login handler sets on redirect. Stores the JWT in localStorage (where
     the SPA expects it) then immediately expires the cookie. -->
<script>
(function () {
  var m = document.cookie.match(/(?:^|;\s*)iotmaker_spa_token=([^;]+)/);
  if (m) {
    try { localStorage.setItem('token', decodeURIComponent(m[1])); } catch(_) {}
    // Expire the cookie immediately — it was single-use.
    document.cookie = 'iotmaker_spa_token=; path=/; max-age=0';
  }
}());
</script>
<!-- FontAwesome brands set — generated by cmd/gen-fa-icons.
     Must load before main.js so FA_BRANDS_SET is available on startup.
     If this file is missing, run: go run ./cmd/gen-fa-icons --fa /path/to/Font-Awesome -->
<script src="/static/js/fa-brands-set.js"></script>
<!-- fa-free-styles.js: window.FA_FREE_STYLES — per-icon map of free
     font families (solid/regular/brands). The Wizard's icon picker
     and the Preview tab use this to pick the correct CSS class so
     icons whose free version is only available as `fa-regular` (e.g.
     `aries`, `aquarius`, `alarm-clock`) render correctly instead
     of as the missing-glyph tofu (□).
     Also derives window.FA_FREE_SET as the keys of this map for
     back-compat with code that just needs "is this free?". -->
<script src="/static/js/fa-free-styles.js"></script>
<script type="module" src="/static/js/main.js"></script>
</body>
</html>
